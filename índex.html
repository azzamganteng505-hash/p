<!DOCTYPE html>
<html>
<head>
  <title>Game Tangkap Kotak</title>

  <style>
    body{
      margin:0;
      overflow:hidden;
      background:#111;
      font-family:Arial;
      color:white;
      text-align:center;
    }

    h1{
      margin-top:20px;
    }

    #score{
      font-size:25px;
    }

    #box{
      width:80px;
      height:80px;
      background:red;
      position:absolute;
      border-radius:15px;
      cursor:pointer;
    }
  </style>
</head>

<body>

<h1>🎮 Tangkap Kotaknya!</h1>
<p id="score">Score: 0</p>

<div id="box"></div>

<script>
  let score = 0;

  const box = document.getElementById("box");
  const scoreText = document.getElementById("score");

  function pindahBox(){
    const x = Math.random() * (window.innerWidth - 100);
    const y = Math.random() * (window.innerHeight - 100);

    box.style.left = x + "px";
    box.style.top = y + "px";
  }

  box.addEventListener("click", function(){
    score++;
    scoreText.innerHTML = "Score: " + score;
    pindahBox();
  });

  pindahBox();
</script>

</body>
</html>
